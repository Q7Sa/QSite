<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Slideshow - QSite</title>
    <link rel="stylesheet" href="../styles/variables.css">
    <link rel="stylesheet" href="../styles/slideshow.css">
</head>
<body>
    <div id="slideshow-container">
        <div id="slide-1" class="slide active"></div>
        <div id="slide-2" class="slide"></div>
    </div>
    
    <!-- Permanent Navigation -->
    <a href="../index.html" id="back-home-btn" class="glass-btn">
        <i class="fa-solid fa-house"></i> Back Home
    </a>

    <!-- Settings Panel Toggle -->
    <button id="settings-toggle-btn" class="glass-btn">
        Settings
    </button>

    <!-- Prominent Settings Overlay -->
    <div id="settings-overlay" class="hidden">
        <div id="settings-panel" class="glass-panel">
            <div class="panel-header">
                <h2>Slideshow Settings</h2>
                <button id="close-settings-btn">&times;</button>
            </div>
            
            <div class="setting-group">
                <label for="speed-range">Slide Speed (seconds)</label>
                <div class="range-container">
                    <input type="range" id="speed-range" min="1" max="20" step="0.5" value="5">
                    <span id="speed-value">5s</span>
                </div>
            </div>

            <div class="setting-group">
                <label for="fade-range">Fade Duration (seconds)</label>
                <div class="range-container">
                    <input type="range" id="fade-range" min="0.1" max="5" step="0.1" value="1">
                    <span id="fade-value">1s</span>
                </div>
            </div>

            <div class="setting-group">
                <label class="switch-container">
                    <span>Random Order</span>
                    <input type="checkbox" id="random-toggle">
                    <span class="checkmark"></span>
                </label>
            </div>

            <div class="setting-group">
                <label class="switch-container">
                    <span>Show Controls</span>
                    <input type="checkbox" id="controls-toggle" checked>
                    <span class="checkmark"></span>
                </label>
            </div>

            <div class="panel-footer">
                <button id="reset-settings-btn" class="btn-secondary">Reset to Defaults</button>
            </div>
        </div>
    </div>

    <div id="controls" class="">
        <button id="prev-btn">&lt;</button>
        <button id="next-btn">&gt;</button>
        <button id="play-pause-btn">Pause</button>
    </div>

    <!-- FontAwesome for the home icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script type="module" src="../slideshow.js"></script>
</body>
</html>
